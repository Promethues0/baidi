# 白帝网关 · 内核态隐身 pf 规则（macOS Packet Filter）
# 默认 DROP 代理端口；仅放行 pf 表 <baidi_allowed> 内、经 SPA 敲门授权的源 IP。
# 用 firewall/setup-pf.sh 加载（需 sudo）。PROXY_PORT 默认 18443，可改。
#
# 与用户态 accept+close 的区别：DROP 不回 RST，端口在网络层对未授权者“不存在”，
# nmap/扫描器看到的是 filtered 而非 closed —— 真隐身。

table <baidi_allowed> persist

# 默认丢弃所有到代理端口的入站 TCP（无 RST）
block drop in quick proto tcp to port 18443

# 仅放行已授权源 IP（网关经 pfctl -t baidi_allowed -T add/delete 动态维护）
pass in quick proto tcp from <baidi_allowed> to port 18443 keep state

# SPA 敲门端口（UDP）保持可达，否则无法敲门
pass in quick proto udp to port 18201 keep state
