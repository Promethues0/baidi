# 白帝控制台 nginx 站点（共存版）：独立端口、**非 default_server**。
# 该机已有烛龙 nginx 独占 80/443 的 default_server；白帝绝不抢占——只在 @BD_HTTPS_PORT@(默认 9443)
# 起一个具名 server，零副作用于烛龙。占位由 install-remote.sh 渲染。
# 鉴权由白帝自身 JWT 负责（不再用 nginx basic-auth）。

server {
    listen @BD_HTTPS_PORT@ ssl http2;    # 独立端口，不做默认站点；http2 写 listen 参数(兼容 nginx 1.24/1.25+)
    server_name @PUBLIC_HOST@;           # 具名，避免兜底抢占默认站点

    ssl_certificate     @BD_PREFIX@/etc/tls/server.crt;
    ssl_certificate_key @BD_PREFIX@/etc/tls/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root @BD_PREFIX@/web;
    index index.html;

    # SPA：管理台(/、/login、各功能页) 与 终端用户门户(/portal/*) 共用 history 回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 管理 API 反代到 baidi-control（回环；保留 /api 前缀；透传 Bearer）
    location /api/ {
        proxy_pass http://127.0.0.1:@CONTROL_PORT@;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
    }
}
