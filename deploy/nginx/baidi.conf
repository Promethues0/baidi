# 白帝控制台 nginx 站点：HTTPS + 80→443 跳转 + SPA 回退 + /api 反代控制中心
# 形如 @BD_PREFIX@ / @CONTROL_PORT@ 的占位由 install-remote.sh 渲染。
# 鉴权由白帝自身 JWT 负责（不再用 nginx basic-auth）。

server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     @BD_PREFIX@/etc/tls/server.crt;
    ssl_certificate_key @BD_PREFIX@/etc/tls/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    root @BD_PREFIX@/web;
    index index.html;

    # SPA：管理台(/、/login、各功能页) 与 终端用户门户(/portal/*) 共用 history 回退
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 管理 API 反代到 baidi-control（保留 /api 前缀；透传 Bearer）
    location /api/ {
        proxy_pass http://127.0.0.1:@CONTROL_PORT@;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
    }
}
